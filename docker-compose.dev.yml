# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml — Development Environment
# Usage: npm run docker:dev
# ─────────────────────────────────────────────────────────────────────────────

name: vaahedi-dev

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaahedi}
      POSTGRES_USER: ${POSTGRES_USER:-vaahedi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vaahedi_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaahedi} -d ${POSTGRES_DB:-vaahedi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "" --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vaahedi_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-vaahedi_minio_secret}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:

networks:
  default:
    name: vaahedi-dev-network
