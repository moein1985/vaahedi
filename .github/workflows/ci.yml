name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Typecheck ─────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/db && npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/db && npx prisma generate

      - name: Run database migrations
        run: cd packages/db && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

  # ── E2E Alias Smoke ─────────────────────────────────────────────────────────
  e2e-alias-smoke:
    name: E2E Alias Smoke
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: vaahedi
          POSTGRES_USER: vaahedi
          POSTGRES_PASSWORD: vaahedi_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vaahedi -d vaahedi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/db && npx prisma generate

      - name: Migrate and seed database
        run: |
          npm run db:migrate:prod --workspace @repo/db
          npm run db:seed --workspace @repo/db
        env:
          DATABASE_URL: postgresql://vaahedi:vaahedi_pass@localhost:5433/vaahedi?schema=public

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run alias smoke tests
        shell: bash
        env:
          DATABASE_URL: postgresql://vaahedi:vaahedi_pass@localhost:5433/vaahedi?schema=public
          REDIS_URL: redis://localhost:6379
          FRONTEND_URL: http://localhost:3002
          VITE_API_URL: http://localhost:4000
          PLAYWRIGHT_BASE_URL: http://localhost:3002
        run: |
          npm run dev --workspace @repo/server > server.log 2>&1 &
          SERVER_PID=$!
          npm run dev --workspace @repo/web -- --host 0.0.0.0 --port 3002 > web.log 2>&1 &
          WEB_PID=$!

          cleanup() {
            kill $SERVER_PID $WEB_PID || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://localhost:4000/health >/dev/null && curl -fsS http://localhost:3002/auth/login >/dev/null; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "App services did not become ready in time"
              echo "---- server.log ----"
              cat server.log || true
              echo "---- web.log ----"
              cat web.log || true
              exit 1
            fi
            sleep 2
          done

          npx playwright test e2e/alias-routes.smoke.spec.ts e2e/alias-routes.mobile.smoke.spec.ts --project=chromium

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/db && npx prisma generate

      - name: Build all packages
        run: npm run build

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets['SERVER_HOST'] }}
          username: ${{ secrets['SERVER_USER'] }}
          key: ${{ secrets['SERVER_SSH_KEY'] }}
          script: |
            cd /opt/vaahedi
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T api node packages/db/prisma/migrate-prod.js
            echo "✅ Deployment completed at $(date)"
